version: "3.9"

services:

  api:
    build: .
    container_name: alemeno_api

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/alemeno_db
      REDIS_URL: redis://redis:6379/0


  worker:
    build: .
    container_name: alemeno_worker

    command: celery -A app.worker.celery_app worker --pool=solo --loglevel=info

    volumes:
      - .:/app

    depends_on:
      - db
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/alemeno_db
      REDIS_URL: redis://redis:6379/0


  db:
    image: postgres:16
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alemeno_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: redis_server

    ports:
      - "6379:6379"


volumes:
  postgres_data: